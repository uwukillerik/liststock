version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sclad
      POSTGRES_USER: sclad_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sclad_user -d sclad"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://sclad_user:${POSTGRES_PASSWORD:-changeme}@db:5432/sclad
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-ScladAdmin!}
      SEED_WORKER_PASSWORD: ${SEED_WORKER_PASSWORD:-ScladWorker!}
    ports:
      - "${APP_PORT:-3000}:3000"
    command: >
      sh -c "
        node --input-type=module <<'EOF'
          import { execSync } from 'child_process';
          execSync('node dist/server/node-build.mjs --db-setup', { stdio: 'inherit' });
        EOF
        node dist/server/node-build.mjs
      "

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    profiles:
      - with-nginx

volumes:
  postgres_data:
